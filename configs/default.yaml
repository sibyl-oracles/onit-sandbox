# Sandbox MCP Server Configuration
# This file contains the default configuration for the sandbox server

server:
  name: SandboxMCPServer
  description: Python code execution sandbox with package installation
  host: 0.0.0.0
  port: 18205
  path: /sse
  transport: sse
  enabled: true

docker:
  # Primary image - built from docker/Dockerfile
  sandbox_image: onit-sandbox:latest
  # Fallback image if sandbox_image not available
  fallback_image: python:3.12-slim

  # Resource limits
  memory_limit: 64g
  cpu_quota: 0  # 0 = no limit (use all available CPUs)
  pids_limit: 4096
  shm_size: 16g  # shared memory for PyTorch DataLoader workers

  # Network settings
  network_disabled_default: true

  # Timeouts (in seconds)
  default_timeout: 600
  install_timeout: 600
  max_timeout: 86400  # 24 hours

  # Maximum bytes of stdout/stderr returned per tool call
  max_output_bytes: 50000

  # Data volume mounts — mount host directories into the sandbox.
  # Each entry is "host_path:container_path:mode" where mode is "ro" or "rw".
  # Example: ["/data:/data:ro", "/models:/models:rw"]
  data_mounts: []

# Logging configuration
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
